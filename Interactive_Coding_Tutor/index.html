<!DOCTYPE html>
<html>
<head>
  <title>Code Learning Platform</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    button, select {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    textarea {
      width: 80%;
      height: 120px;
      margin-top: 10px;
      font-size: 16px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      width: 60%;
      border-radius: 10px;
    }

    #result { margin-top: 10px; }
    #hint { color: #38bdf8; }
    #score { color: #facc15; }
  </style>
</head>
<body>

<h1>💻 Code Learning Platform</h1>

<div id="start">
  <p>Do you know how to code?</p>
  <button onclick="chooseMode('learn')">No, Teach Me</button>
  <button onclick="chooseMode('game')">Yes, Test Me</button>
</div>

<div id="language" style="display:none;">
  <p>Choose a language:</p>
  <button onclick="setLanguage('java')">Java</button>
  <button onclick="setLanguage('python')">Python</button>
  <button onclick="setLanguage('javascript')">JavaScript</button>
</div>

<div id="app" class="card" style="display:none;">
  <p id="progress"></p>
  <p id="question"></p>

  <textarea id="code" placeholder="Type your code here..."></textarea><br>

  <button onclick="checkAnswer()">Check</button>
  <button onclick="nextStep()">Next</button>

  <p id="result"></p>
  <p id="hint"></p>
  <p id="score"></p>
</div>

<script>
let mode = "";
let language = "";
let current = -1;
let score = 0;
let currentSet = [];

// ===== CONTENT =====
const content = {
  java: {
    learn: [
      {
        q: "In Java, we create variables using types. Example:\nint x = 5;\nTry typing that below.",
        a: "int x = 5;",
        h: "Use int and ;"
      },
      {
        q: "Java prints using:\nSystem.out.println(\"Hello\");\nTry it.",
        a: "system.out.println(\"hello\");",
        h: "Exact spelling matters"
      }
    ],
    game: [
      {
        q: "Create an int variable y = 10",
        a: "int y = 10;",
        h: "Use int"
      },
      {
        q: "Write a for loop from 0 to 5",
        a: "for(int i=0;i<5;i++)",
        h: "Use i++"
      }
    ]
  },

  python: {
    learn: [
      {
        q: "Python variables don’t need types:\nx = 5\nTry it.",
        a: "x = 5",
        h: "No int needed"
      },
      {
        q: "Print in Python:\nprint(\"Hello\")",
        a: "print(\"hello\")",
        h: "Use print()"
      }
    ],
    game: [
      {
        q: "Create variable y = 10",
        a: "y = 10",
        h: "Simple assignment"
      },
      {
        q: "Write a loop from 0 to 5",
        a: "for i in range(5)",
        h: "Use range()"
      }
    ]
  },

  javascript: {
    learn: [
      {
        q: "JavaScript variables:\nlet x = 5;",
        a: "let x = 5",
        h: "Use let"
      },
      {
        q: "Print using:\nconsole.log(\"Hello\");",
        a: "console.log(\"hello\")",
        h: "Use console.log"
      }
    ],
    game: [
      {
        q: "Create variable y = 10",
        a: "let y = 10",
        h: "Use let"
      },
      {
        q: "Write an if statement: x > 5",
        a: "if(x>5)",
        h: "Use parentheses"
      }
    ]
  }
};

// ===== LOGIC =====

function normalize(t){
  return t.toLowerCase().replace(/\s+/g,'').replace(/;/g,'');
}

function chooseMode(m){
  mode = m;
  document.getElementById("start").style.display = "none";
  document.getElementById("language").style.display = "block";
}

function setLanguage(lang){
  language = lang;
  currentSet = content[lang][mode];
  score = 0;
  current = -1;

  document.getElementById("language").style.display = "none";
  document.getElementById("app").style.display = "block";

  nextStep();
}

function nextStep(){
  current++;

  if(current >= currentSet.length){
    document.getElementById("question").textContent = "🎉 Finished!";
    return;
  }

  document.getElementById("question").textContent = currentSet[current].q;
  document.getElementById("code").value = "";
  document.getElementById("result").textContent = "";
  document.getElementById("hint").textContent = "";

  document.getElementById("progress").textContent =
    `${mode.toUpperCase()} | ${language.toUpperCase()} | Step ${current+1}/${currentSet.length}`;

  document.getElementById("score").textContent = `Score: ${score}`;
}

function checkAnswer(){
  const user = normalize(document.getElementById("code").value);
  const correct = normalize(currentSet[current].a);

  if(user.includes(correct)){
    document.getElementById("result").textContent = "✅ Correct!";
    score++;
  } else {
    document.getElementById("result").textContent = "❌ Try again!";
    document.getElementById("hint").textContent = "Hint: " + currentSet[current].h;
  }

  document.getElementById("score").textContent = `Score: ${score}`;
}
</script>

</body>
</html>
