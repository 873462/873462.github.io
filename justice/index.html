<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Justice Simulator 1754 BCE</title>

<style>
body {
    margin: 0;
    font-family: Georgia, serif;
    background: radial-gradient(circle at center, #3b2a16, #1a1208);
    color: #e8d8b0;
    text-align: center;
}

h1 {
    font-size: 42px;
    color: gold;
    text-shadow: 2px 2px 8px black;
}

.screen {
    padding: 40px;
    animation: fadeIn 0.8s ease-in-out;
}

.case-box {
    background: linear-gradient(145deg, #4a351d, #2f2112);
    border: 3px solid #a67c00;
    border-radius: 15px;
    padding: 30px;
    max-width: 800px;
    margin: auto;
    box-shadow: 0 0 25px black;
}

button {
    background: linear-gradient(145deg, #c9a227, #a67c00);
    border: none;
    padding: 12px 20px;
    margin: 8px;
    font-size: 15px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
    transition: 0.2s;
}

button:hover { transform: scale(1.05); }
button:disabled {
    background: #555;
    cursor: not-allowed;
}

.visual {
    font-size: 60px;
    margin: 15px 0;
}

#harshness-bar {
    width: 70%;
    height: 20px;
    background-color: #333;
    margin: 15px auto;
    border-radius: 10px;
    overflow: hidden;
}

#harshness-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, green, yellow, red);
    transition: width 0.5s;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const cases = [
{
title: "The Injured Eye",
visual: "👁️⚔️",
text: "A man destroys the eye of another man during a fight.",
hammurabi: "Law #196: 'An eye for an eye.'",
canada: "In Canada, this would likely result in assault charges under the Criminal Code, potentially imprisonment or fines depending on severity.",
correct: "eye",
options: [
{text:"Warning", value:"warn", harsh:0},
{text:"Fine", value:"fine", harsh:1},
{text:"Imprison", value:"jail", harsh:1},
{text:"Public Shaming", value:"shame", harsh:1},
{text:"Destroy His Eye", value:"eye", harsh:2}
]
},
{
title: "The Collapsed House",
visual: "🏠💥",
text: "A builder constructs a house. It collapses and kills the owner.",
hammurabi: "Law #229: 'The builder shall be put to death.'",
canada: "In Canada, this could result in criminal negligence causing death, investigated before any punishment is determined.",
correct: "death",
options: [
{text:"Warning", value:"warn", harsh:0},
{text:"Fine", value:"fine", harsh:1},
{text:"Imprison", value:"jail", harsh:1},
{text:"Compensation Only", value:"comp", harsh:1},
{text:"Execute Builder", value:"death", harsh:2}
]
},
{
title: "The Stolen Ox",
visual: "🐂💰",
text: "A man steals an ox from another citizen.",
hammurabi: "Law #8: 'He shall repay thirtyfold.'",
canada: "In Canada, theft under the Criminal Code may result in fines, restitution, probation, or imprisonment depending on value.",
correct: "repay",
options: [
{text:"Warning", value:"warn", harsh:0},
{text:"Repay Once", value:"small", harsh:1},
{text:"Fine Only", value:"fine", harsh:1},
{text:"Imprison", value:"jail", harsh:1},
{text:"Repay Thirtyfold", value:"repay", harsh:2}
]
}
];

let currentCase = 0;
let harshnessScore = 0;

function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.frequency.value = type === "correct" ? 600 : 200;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(()=>osc.stop(),200);
}

function startScreen() {
    document.getElementById("app").innerHTML = `
        <div class="screen">
            <h1>⚖ Justice Simulator 1754 BCE ⚖</h1>
            <p>You are about to play as a Babylonian judge.</p>
            <p>You must decide the punishment for each case presented.</p>
            <p>Your choices will reveal how justice was carved into law.</p>
            <button onclick="loadCase()">Begin Judgment</button>
        </div>
    `;
}

function loadCase() {
    if (currentCase >= cases.length) {
        return finalScreen();
    }

    const c = cases[currentCase];

    document.getElementById("app").innerHTML = `
        <div class="screen">
        <div id="harshness-bar"><div id="harshness-fill"></div></div>
        <div class="case-box">
            <h2>${c.title}</h2>
            <div class="visual">${c.visual}</div>
            <p>${c.text}</p>
            <div id="options"></div>
            <div id="result"></div>
        </div>
        </div>
    `;

    updateBar();

    const optionsDiv = document.getElementById("options");
    c.options.forEach(option => {
        const btn = document.createElement("button");
        btn.innerText = option.text;
        btn.onclick = () => choose(option.value, option.harsh);
        optionsDiv.appendChild(btn);
    });
}

function choose(choice, harshValue) {
    const buttons = document.querySelectorAll("button");
    buttons.forEach(btn => btn.disabled = true);

    const c = cases[currentCase];
    harshnessScore += harshValue;
    updateBar();

    const resultDiv = document.getElementById("result");

    if (choice === c.correct) {
        playSound("correct");
    } else {
        playSound("wrong");
    }

    resultDiv.innerHTML = `
        <hr>
        <strong>Hammurabi's Law:</strong><br>${c.hammurabi}<br><br>
        <strong>Modern Canadian Law:</strong><br>${c.canada}<br><br>
        <button onclick="nextCase()">Next Case</button>
    `;
}

function nextCase() {
    currentCase++;
    loadCase();
}

function updateBar() {
    const percent = (harshnessScore / (cases.length * 2)) * 100;
    const fill = document.getElementById("harshness-fill");
    if (fill) fill.style.width = percent + "%";
}

function finalScreen() {
    let message;
    if (harshnessScore >= 5) {
        message = "You ruled with strict retaliation.";
    } else {
        message = "You ruled with moderation compared to ancient standards.";
    }

    document.getElementById("app").innerHTML = `
        <div class="screen">
            <h1>Final Judgment</h1>
            <p>${message}</p>
            <p>Total Harshness Score: ${harshnessScore}</p>
            <p>The Code of Hammurabi focused on deterrence and strict order. Modern Canadian law emphasizes investigation, rights, and proportional punishment.</p>
            <button onclick="restart()">Carve New Judgments</button>
        </div>
    `;
}

function restart() {
    currentCase = 0;
    harshnessScore = 0;
    startScreen();
}

startScreen();
</script>

</body>
</html>
