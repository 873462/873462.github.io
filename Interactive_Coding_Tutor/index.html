<!DOCTYPE html>
<html>
<head>
  <title>Code Learning Platform</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    textarea {
      width: 80%;
      height: 140px;
      margin-top: 10px;
      font-size: 16px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      width: 65%;
      border-radius: 10px;
    }

    #lesson {
      color: #38bdf8;
      white-space: pre-line;
      margin-bottom: 10px;
    }

    #score { color: #facc15; }
  </style>
</head>
<body>

<h1>💻 Code Learning Platform</h1>

<div id="start">
  <p>Do you know how to code?</p>
  <button onclick="chooseMode('learn')">No, Teach Me</button>
  <button onclick="chooseMode('game')">Yes, Test Me</button>
</div>

<div id="language" style="display:none;">
  <p>Choose a language:</p>
  <button onclick="setLanguage()">Java</button>
</div>

<div id="app" class="card" style="display:none;">
  <p id="progress"></p>
  <p id="lesson"></p>
  <p id="question"></p>

  <textarea id="code"></textarea><br>

  <button onclick="checkAnswer()">Check</button>
  <button onclick="nextStep()">Next</button>

  <p id="result"></p>
  <p id="hint"></p>
  <p id="score"></p>
</div>

<script>
let mode = "";
let current = -1;
let score = 0;
let currentSet = [];

// ===== COURSE =====
const content = {

java: {
learn: [

{lesson:"📘 INT\nWhole numbers.\nExample: int x = 5;", q:"Create the variable 'x' that has the value 5", a:"int x = 5;", h:"Use int and ;"},

{lesson:"📘 FLOAT\nDecimal (less precise).\nExample: float y = 3.5f;", q:"Create the variable 'y' that has the value 3.5", a:"float y = 3.5f;", h:"Use float and ;"},

{lesson:"📘 DOUBLE\nMore precise decimal.\nExample: double z = 3.5;", q:"Create the variable 'z' that has the presice value 3.5", a:"double z = 3.5;", h:"Use double and ;"},

{lesson:"📘 STRING\nText must use capital S.\nExample: String name = \"Bob\";", q:"Create name = \"Bob\"", a:"String name = \"Bob\";", h:"Use capital String and quotes"},

{lesson:"📘 ADDITION (+)", q:"Make x equal to five plus six", a:"int x = 5 + 6;", h:"Use + and ;"},

{lesson:"📘 SUBTRACTION (-)", q:"Make x equal to ten minus three", a:"int x = 10 - 3;", h:"Use -"},

{lesson:"📘 MULTIPLICATION (*)", q:"Make x equal to five times two", a:"int x = 5 * 2;", h:"Use *"},

{lesson:"📘 DIVISION (/)", q:"Make x equal to ten divided by two", a:"int x = 10 / 2;", h:"Use /"},

{lesson:"📘 MOD (%)\nRemainder", q:"Make x = 10 % 3", a:"int x = 10 % 3;", h:"Use %"},

{lesson:"📘 IF if(x < 10){}", q:"Make and if statement that would run if x is greater than five", a:"if(x > 5){}", h:"Use ()"},

{lesson:"📘 IF ELSE  if(x < 3){} else{}", q:"Make and if else statement that would run if x is greater than five", a:"if(x > 5){} else{}", h:"Include else"},

{lesson:"📘 FOR LOOP for(int i=1;i<6;i++){}" , q:"Make a loop that will run when an interger i starts at zero, and the loop will run untill i is greater than 5", a:"for(int i=0;i<5;i++){}", h:"Use i++"},

{lesson:"📘 WHILE LOOP  while(x > 5){}", q:"Make a while loop that runs when x less than five", a:"while(x < 5)", h:"Use while"},

// FINAL TEST
{
lesson:
"FINAL EXAM\nWrite a program that:\n\n" +
"- Creates int x = 0;\n" +
"- Uses a loop from 0 to 10\n" +
"- Uses if/else\n" +
"- Uses % to check even/odd\n" +
"- Prints Even or Odd\n" +
"- Uses proper syntax (including ;)",

q:"Write full program using all concepts",
a:"FINAL",
h:"Use everything you learned"
}

],

game: []
}

};

// ===== LOGIC =====

function normalize(t){
return t.toLowerCase().replace(/\s+/g,'');
}

function chooseMode(m){
mode = m;
document.getElementById("start").style.display = "none";
document.getElementById("language").style.display = "block";
}

function setLanguage(){
currentSet = content.java.learn;
score = 0;
current = -1;

document.getElementById("language").style.display = "none";
document.getElementById("app").style.display = "block";

nextStep();
}

function nextStep(){
current++;

if(current >= currentSet.length){
document.getElementById("question").textContent = " Course Complete!";
document.getElementById("lesson").textContent = "";
return;
}

document.getElementById("lesson").textContent = currentSet[current].lesson;
document.getElementById("question").textContent = "👉 Try: " + currentSet[current].q;

document.getElementById("code").value = "";
document.getElementById("result").textContent = "";
document.getElementById("hint").textContent = "";

document.getElementById("progress").textContent =
`${current+1}/${currentSet.length}`;

document.getElementById("score").textContent = `Score: ${score}`;
}

function checkAnswer(){

const user = document.getElementById("code").value;
const userLower = user.toLowerCase();

// ===== FINAL TEST =====
if(currentSet[current].a === "FINAL"){

let feedback = [];

if(!user.includes("int x")){
feedback.push("❌ Missing variable: int x");
}

if(!user.includes(";")){
feedback.push("❌ Missing semicolons (;)");
}

if(!userLower.includes("for(") && !userLower.includes("while(")){
feedback.push("❌ Missing loop");
}

if(!userLower.includes("%")){
feedback.push("❌ Missing modulo (%)");
}

if(!userLower.includes("if(")){
feedback.push("❌ Missing if statement");
}

if(!userLower.includes("else")){
feedback.push("❌ Missing else statement");
}

if(!userLower.includes("system.out")){
feedback.push("❌ Missing print statement");
}

if(!userLower.includes("i++")){
feedback.push("❌ Loop missing increment (i++)");
}

if(feedback.length === 0){
document.getElementById("result").textContent =
"🎉 Perfect! Full correct program!";
score++;
} else {
document.getElementById("result").textContent =
feedback.join(" | ");
}

document.getElementById("score").textContent = `Score: ${score}`;
return;
}

// ===== NORMAL QUESTIONS =====

const correct = currentSet[current].a;

let feedback = [];

// Check exact match first
if(normalize(user).includes(normalize(correct))){
document.getElementById("result").textContent = "✅ Correct!";
score++;
} else {

if(correct.includes(";") && !user.includes(";")){
feedback.push("❌ Missing semicolon (;)");
}

// SPECIAL CHECK FOR STRING
if(correct.includes("String") && !user.includes("String")){
feedback.push("❌ 'String' must have a capital S");
}

if(feedback.length === 0){
feedback.push("❌ Try again!");
}

document.getElementById("result").textContent = feedback.join(" | ");
document.getElementById("hint").textContent =
"Hint: " + currentSet[current].h;
}

document.getElementById("score").textContent = `Score: ${score}`;
}
</script>

</body>
</html>
