<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Justice Simulator 1754 BCE</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: radial-gradient(circle at center, #3b2a16, #1a1208);
    color: #e8d8b0;
    text-align: center;
}

header {
    padding: 25px;
    border-bottom: 3px solid #a67c00;
}

h1 {
    font-size: 42px;
    color: gold;
    text-shadow: 2px 2px 5px black;
}

#game-container {
    padding: 30px;
}

.case-box {
    background: linear-gradient(145deg, #4a351d, #2f2112);
    border: 3px solid #a67c00;
    border-radius: 15px;
    padding: 30px;
    max-width: 750px;
    margin: auto;
    box-shadow: 0 0 25px black;
    animation: fadeIn 0.8s ease-in-out;
}

button {
    background: linear-gradient(145deg, #c9a227, #a67c00);
    border: none;
    padding: 12px 20px;
    margin: 10px;
    font-size: 15px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
    transition: transform 0.1s, background 0.3s;
}

button:hover {
    background: #ffd700;
    transform: scale(1.05);
}

button:active {
    transform: scale(0.95);
}

#result {
    margin-top: 20px;
    font-size: 18px;
    min-height: 60px;
}

#progress {
    margin-top: 10px;
    font-size: 14px;
    color: #c9a227;
}

#harshness-bar {
    width: 80%;
    height: 20px;
    background-color: #333;
    margin: 15px auto;
    border-radius: 10px;
    overflow: hidden;
}

#harshness-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, green, yellow, red);
    transition: width 0.5s;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

footer {
    margin-top: 30px;
    padding: 15px;
    border-top: 3px solid #a67c00;
    font-size: 13px;
}
</style>
</head>

<body>

<header>
<h1>⚖ Justice Simulator 1754 BCE ⚖</h1>
<p>You are a Babylonian judge. Carve justice into stone.</p>
<div id="progress"></div>
<div id="harshness-bar"><div id="harshness-fill"></div></div>
</header>

<div id="game-container"></div>

<footer>
Based on the Code of Hammurabi (c. 1754 BCE)
</footer>

<script>
const cases = [
{
title: "Case 1: The Injured Eye",
text: "A man destroys the eye of another man during a fight.",
law: "Law #196: 'If a man destroy the eye of another man, they shall destroy his eye.'",
correct: "eye",
options: [
{text:"Fine Him", value:"fine", harsh:0},
{text:"Imprison Him", value:"jail", harsh:1},
{text:"Destroy His Eye", value:"eye", harsh:2}
]
},
{
title: "Case 2: The Collapsed House",
text: "A builder constructs a house. It collapses and kills the owner.",
law: "Law #229: 'The builder shall be put to death.'",
correct: "death",
options: [
{text:"Compensation", value:"fine", harsh:0},
{text:"Imprison Builder", value:"jail", harsh:1},
{text:"Execute Builder", value:"death", harsh:2}
]
},
{
title: "Case 3: The Stolen Ox",
text: "A man steals an ox from another citizen.",
law: "Law #8: 'He shall repay thirtyfold.'",
correct: "repay",
options: [
{text:"Warning", value:"warn", harsh:0},
{text:"Repay Once", value:"small", harsh:1},
{text:"Repay Thirtyfold", value:"repay", harsh:2}
]
},
{
title: "Case 4: False Accusation",
text: "A man accuses another of murder but cannot prove it.",
law: "Law #3: 'The accuser shall be put to death.'",
correct: "death",
options: [
{text:"Dismiss Case", value:"dismiss", harsh:0},
{text:"Fine Accuser", value:"fine", harsh:1},
{text:"Execute Accuser", value:"death", harsh:2}
]
},
{
title: "Case 5: Striking a Father",
text: "A son strikes his father during an argument.",
law: "Law #195: 'His hands shall be cut off.'",
correct: "hands",
options: [
{text:"Warning", value:"warn", harsh:0},
{text:"Imprisonment", value:"jail", harsh:1},
{text:"Cut Off Hands", value:"hands", harsh:2}
]
}
];

let currentCase = 0;
let harshnessScore = 0;

function playSound(type) {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    oscillator.type = "sine";
    oscillator.frequency.value = type === "correct" ? 600 : 200;
    oscillator.connect(audioCtx.destination);
    oscillator.start();
    setTimeout(() => oscillator.stop(), 200);
}

function updateHarshnessBar() {
    const percentage = (harshnessScore / (cases.length * 2)) * 100;
    document.getElementById("harshness-fill").style.width = percentage + "%";
}

function loadCase() {
    if (currentCase >= cases.length) {
        showFinalScreen();
        return;
    }

    const c = cases[currentCase];
    document.getElementById("progress").innerText = 
        `Case ${currentCase + 1} of ${cases.length}`;

    document.getElementById("game-container").innerHTML = `
        <div class="case-box">
            <h2>${c.title}</h2>
            <p>${c.text}</p>
            <div id="options"></div>
            <div id="result"></div>
        </div>
    `;

    const optionsDiv = document.getElementById("options");
    c.options.forEach(option => {
        const btn = document.createElement("button");
        btn.innerText = option.text;
        btn.onclick = () => choose(option.value, option.harsh);
        optionsDiv.appendChild(btn);
    });
}

function choose(choice, harshValue) {
    const resultDiv = document.getElementById("result");
    const correctAnswer = cases[currentCase].correct;
    harshnessScore += harshValue;
    updateHarshnessBar();

    if (choice === correctAnswer) {
        playSound("correct");
        resultDiv.innerHTML = "✔ This matches Hammurabi's law.<br><br>" + cases[currentCase].law;
    } else {
        playSound("wrong");
        resultDiv.innerHTML = "✖ In Babylon, this would be incorrect.<br><br>" + cases[currentCase].law;
    }

    const nextBtn = document.createElement("button");
    nextBtn.innerText = "Carve Next Judgment";
    nextBtn.onclick = () => {
        currentCase++;
        loadCase();
    };

    resultDiv.appendChild(document.createElement("br"));
    resultDiv.appendChild(nextBtn);
}

function showFinalScreen() {
    let judgment;

    if (harshnessScore >= 7) {
        judgment = "You ruled with fear and absolute retaliation.";
    } else if (harshnessScore >= 4) {
        judgment = "You balanced authority and restraint.";
    } else {
        judgment = "You showed mercy beyond ancient standards.";
    }

    document.getElementById("game-container").innerHTML = `
        <div class="case-box">
            <h2>Final Judgment</h2>
            <p>${judgment}</p>
            <p>Your Harshness Score: ${harshnessScore}</p>
            <p>The Code of Hammurabi emphasized strict punishment, social order, and deterrence. Modern legal systems focus more on intent, investigation, and proportionality.</p>
        </div>
    `;
}

loadCase();
</script>

</body>
</html>
