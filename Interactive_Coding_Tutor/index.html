<!DOCTYPE html>
<html>
<head>
  <title>Code Learning Platform</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    textarea {
      width: 80%;
      height: 120px;
      margin-top: 10px;
      font-size: 16px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      width: 65%;
      border-radius: 10px;
    }

    #lesson {
      color: #38bdf8;
      margin-bottom: 15px;
      white-space: pre-line;
      font-size: 17px;
    }

    #score { color: #facc15; }
  </style>
</head>
<body>

<h1>💻 Code Learning Platform</h1>

<div id="start">
  <p>Do you know how to code?</p>
  <button onclick="chooseMode('learn')">No, Teach Me</button>
  <button onclick="chooseMode('game')">Yes, Test Me</button>
</div>

<div id="language" style="display:none;">
  <p>Choose a language:</p>
  <button onclick="setLanguage('java')">Java</button>
  <button onclick="setLanguage('python')">Python</button>
  <button onclick="setLanguage('javascript')">JavaScript</button>
</div>

<div id="app" class="card" style="display:none;">
  <p id="progress"></p>

  <p id="lesson"></p>
  <p id="question"></p>

  <textarea id="code"></textarea><br>

  <button onclick="checkAnswer()">Check</button>
  <button onclick="nextStep()">Next</button>

  <p id="result"></p>
  <p id="hint"></p>
  <p id="score"></p>
</div>

<script>
let mode = "";
let language = "";
let current = -1;
let score = 0;
let currentSet = [];

// ===== CONTENT (NOW WITH FULL TEACHING) =====
const content = {

java: {
learn: [

{
lesson: "📘 VARIABLES\nA variable stores data.\nIn Java, you must declare the type.\nExample:\nint x = 5;",
q: "Create a variable x equal to 5",
a: "int x = 5;",
h: "Use int and ;"
},

{
lesson: "📘 ADDITION (+)\nThe + operator adds numbers together.\nExample:\nint x = 5 + 3; // x becomes 8",
q: "Add two numbers so that x equals 11",
a: "int x = 5 + 6;",
h: "Use + to add numbers"
},

{
lesson: "📘 STRINGS\nStrings store text using quotes.\nExample:\nString name = \"Bob\";",
q: "Create a String name = \"Bob\"",
a: "String name = \"Bob\";",
h: "Use quotes and String"
},

{
lesson: "📘 IF STATEMENTS\nUsed to make decisions.\nExample:\nif (x > 10) { }",
q: "Write: if x > 10",
a: "if (x > 10)",
h: "Use parentheses"
},

{
lesson: "📘 LOOPS\nLoops repeat code.\nExample:\nfor(int i=0;i<5;i++)",
q: "Write a loop from 0 to 5",
a: "for(int i=0;i<5;i++)",
h: "Use i++"
}

],

game: [
{q:"Create int y = 10",a:"int y = 10;",h:"Use int"},
{q:"Print Hello",a:"System.out.println(\"Hello\");",h:"Use System.out"},
{q:"If x > 5",a:"if (x > 5)",h:"Use ()"}
]
},

python: {
learn: [

{
lesson: "📘 VARIABLES\nPython does not need types.\nExample:\nx = 5",
q: "Create x = 5",
a: "x = 5",
h: "No type needed"
},

{
lesson: "📘 ADDITION (+)\nUse + to add numbers.\nExample:\nx = 5 + 3",
q: "Make x equal 11 using addition",
a: "x = 5 + 6",
h: "Use +"
},

{
lesson: "📘 STRINGS\nUse quotes for text.",
q: "name = \"Bob\"",
a: "name = \"Bob\"",
h: "Use quotes"
},

{
lesson: "📘 IF STATEMENTS",
q: "if x > 10:",
a: "if x > 10:",
h: "Use :"
},

{
lesson: "📘 LOOPS",
q: "for i in range(5):",
a: "for i in range(5):",
h: "Use range"
}

],

game: [
{q:"y = 10",a:"y = 10",h:"Assign value"},
{q:"print Hello",a:"print(\"Hello\")",h:"Use print"},
{q:"if x > 5",a:"if x > 5:",h:"Use :"}
]
},

javascript: {
learn: [

{
lesson: "📘 VARIABLES\nUse let to create variables.\nExample:\nlet x = 5;",
q: "Create x = 5",
a: "let x = 5",
h: "Use let"
},

{
lesson: "📘 ADDITION (+)\nAdds numbers.\nExample:\nlet x = 5 + 3;",
q: "Make x equal 11",
a: "let x = 5 + 6",
h: "Use +"
},

{
lesson: "📘 STRINGS",
q: "let name = \"Bob\"",
a: "let name = \"Bob\"",
h: "Use quotes"
},

{
lesson: "📘 IF STATEMENTS",
q: "if(x > 10)",
a: "if(x > 10)",
h: "Use ()"
},

{
lesson: "📘 LOOPS",
q: "for(let i=0;i<5;i++)",
a: "for(let i=0;i<5;i++)",
h: "Use i++"
}

],

game: [
{q:"let y = 10",a:"let y = 10",h:"Use let"},
{q:"console log hello",a:"console.log(\"Hello\")",h:"Use console.log"},
{q:"if x > 5",a:"if(x > 5)",h:"Use ()"}
]
}

};

// ===== LOGIC =====

function normalize(t){
return t.toLowerCase().replace(/\s+/g,'').replace(/;/g,'');
}

function chooseMode(m){
mode = m;
document.getElementById("start").style.display = "none";
document.getElementById("language").style.display = "block";
}

function setLanguage(lang){
language = lang;
currentSet = content[lang][mode];
score = 0;
current = -1;

document.getElementById("language").style.display = "none";
document.getElementById("app").style.display = "block";

nextStep();
}

function nextStep(){
current++;

if(current >= currentSet.length){
document.getElementById("question").textContent = "🎉 Finished!";
document.getElementById("lesson").textContent = "";
return;
}

document.getElementById("lesson").textContent =
mode === "learn" ? currentSet[current].lesson : "";

document.getElementById("question").textContent =
mode === "learn"
? "👉 Now try: " + currentSet[current].q
: currentSet[current].q;

document.getElementById("code").value = "";
document.getElementById("result").textContent = "";
document.getElementById("hint").textContent = "";

document.getElementById("progress").textContent =
`${mode.toUpperCase()} | ${language.toUpperCase()} | Step ${current+1}/${currentSet.length}`;

document.getElementById("score").textContent = `Score: ${score}`;
}

function checkAnswer(){
const user = normalize(document.getElementById("code").value);
const correct = normalize(currentSet[current].a);

if(user.includes(correct)){
document.getElementById("result").textContent = "✅ Correct!";
score++;
} else {
document.getElementById("result").textContent = "❌ Try again!";
document.getElementById("hint").textContent = "Hint: " + currentSet[current].h;
}

document.getElementById("score").textContent = `Score: ${score}`;
}
</script>

</body>
</html>
