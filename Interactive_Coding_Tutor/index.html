<!DOCTYPE html>
<html>
<head>
  <title>Code Learning Platform</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    textarea {
      width: 80%;
      height: 140px;
      margin-top: 10px;
      font-size: 16px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      width: 65%;
      border-radius: 10px;
    }

    #lesson {
      color: #38bdf8;
      white-space: pre-line;
      margin-bottom: 10px;
    }

    #score { color: #facc15; }
  </style>
</head>
<body>

<h1>💻 Code Learning Platform</h1>

<div id="start">
  <p>Do you know how to code?</p>
  <button onclick="chooseMode('learn')">No, Teach Me</button>
  <button onclick="chooseMode('game')">Yes, Test Me</button>
</div>

<div id="language" style="display:none;">
  <p>Choose a language:</p>
  <button onclick="setLanguage('java')">Java</button>
</div>

<div id="app" class="card" style="display:none;">
  <p id="progress"></p>
  <p id="lesson"></p>
  <p id="question"></p>

  <textarea id="code"></textarea><br>

  <button onclick="checkAnswer()">Check</button>
  <button onclick="nextStep()">Next</button>

  <p id="result"></p>
  <p id="hint"></p>
  <p id="score"></p>
</div>

<script>
let mode = "";
let current = -1;
let score = 0;
let currentSet = [];

// ===== COURSE =====
const content = {

java: {
learn: [

{lesson:"📘 INT\nWhole numbers", q:"int x = 5", a:"int x = 5;", h:"Use int"},
{lesson:"📘 DOUBLE\nDecimals", q:"double y = 3.5", a:"double y = 3.5;", h:"Use double"},
{lesson:"📘 STRING\nText", q:"String name = \"Bob\"", a:"String name = \"Bob\";", h:"Use String"},

{lesson:"📘 OPERATORS\n+ - * / %", q:"int x = 10 % 3", a:"int x = 10 % 3;", h:"Use %"},
{lesson:"📘 IF", q:"if(x > 5)", a:"if(x > 5)", h:"Use ()"},
{lesson:"📘 IF ELSE", q:"if(x > 5) else", a:"if(x > 5) else", h:"Include else"},

{lesson:"📘 FOR LOOP", q:"for(int i=0;i<5;i++)", a:"for(int i=0;i<5;i++)", h:"Use i++"},
{lesson:"📘 WHILE LOOP", q:"while(x < 5)", a:"while(x < 5)", h:"Use while"},

// 🔥 HARD FINAL TEST
{
lesson:
"🎓 FINAL EXAM\nWrite a program that:\n\n" +
"- Creates int x = 0\n" +
"- Uses a loop from 0 to 10\n" +
"- Uses if/else:\n" +
"   • If number is even → print 'Even'\n" +
"   • Else → print 'Odd'\n" +
"- Uses % operator\n" +
"- Prints output",

q:"Write full program with loop + if/else + modulo + print",
a:"FINAL",
h:"Use all concepts"
}

],

game: []
}

};

// ===== LOGIC =====

function normalize(t){
return t.toLowerCase().replace(/\s+/g,'').replace(/;/g,'');
}

function chooseMode(m){
mode = m;
document.getElementById("start").style.display = "none";
document.getElementById("language").style.display = "block";
}

function setLanguage(){
currentSet = content.java.learn;
score = 0;
current = -1;

document.getElementById("language").style.display = "none";
document.getElementById("app").style.display = "block";

nextStep();
}

function nextStep(){
current++;

if(current >= currentSet.length){
document.getElementById("question").textContent = "🎉 Course Complete!";
document.getElementById("lesson").textContent = "";
return;
}

document.getElementById("lesson").textContent = currentSet[current].lesson;
document.getElementById("question").textContent = "👉 Try: " + currentSet[current].q;

document.getElementById("code").value = "";
document.getElementById("result").textContent = "";
document.getElementById("hint").textContent = "";

document.getElementById("progress").textContent =
`${current+1}/${currentSet.length}`;

document.getElementById("score").textContent = `Score: ${score}`;
}

function checkAnswer(){

const user = document.getElementById("code").value.toLowerCase();

// ===== FINAL CHECK =====
if(currentSet[current].a === "FINAL"){

let feedback = [];

if(!user.includes("int x")){
feedback.push("❌ Missing variable (int x)");
}

if(!user.includes("for(") && !user.includes("while(")){
feedback.push("❌ Missing loop");
}

if(!user.includes("%")){
feedback.push("❌ Missing modulo (%) for even/odd");
}

if(!user.includes("if(")){
feedback.push("❌ Missing if statement");
}

if(!user.includes("else")){
feedback.push("❌ Missing else statement");
}

if(!user.includes("print") && !user.includes("system.out")){
feedback.push("❌ Missing output");
}

if(!user.includes("i++")){
feedback.push("❌ Loop missing increment (i++)");
}

if(feedback.length === 0){
document.getElementById("result").textContent =
"🎉 Perfect! This is a full correct solution!";
score++;
} else {
document.getElementById("result").textContent =
feedback.join(" | ");
}

document.getElementById("score").textContent = `Score: ${score}`;
return;
}

// ===== NORMAL CHECK =====
const userNorm = normalize(user);
const correct = normalize(currentSet[current].a);

if(userNorm.includes(correct)){
document.getElementById("result").textContent = "✅ Correct!";
score++;
} else {
document.getElementById("result").textContent = "❌ Try again!";
document.getElementById("hint").textContent =
"Hint: " + currentSet[current].h;
}

document.getElementById("score").textContent = `Score: ${score}`;
}
</script>

</body>
</html>
