<!DOCTYPE html>
<html>
<head>
<title>Justice Simulator 1754 BCE</title>
<style>
body {
    margin: 0;
    font-family: "Papyrus", fantasy;
    background: linear-gradient(#2c1b0f, #1a0f08);
    color: #f4e6c8;
    text-align: center;
}

#container {
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

h1 {
    font-size: 48px;
    text-shadow: 3px 3px #000;
}

button {
    background: linear-gradient(#8b5a2b, #5a3a1b);
    color: #fff8dc;
    border: 3px solid #3e2a14;
    padding: 12px 20px;
    margin: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: transform 0.2s, background 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: linear-gradient(#a66b3d, #6a4422);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

#visual {
    margin: 20px auto;
    border: 5px solid #3e2a14;
    background: #d2b48c;
}

#feedback {
    margin-top: 20px;
    font-size: 18px;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div id="container">

<div id="startScreen">
    <h1>⚖️ Justice Simulator 1754 BCE ⚖️</h1>
    <p>You are about to serve as a Babylonian judge under King Hammurabi.</p>
    <p>For each case, choose the punishment. You may only decide once.</p>
    <p>Your judgment will be compared to both Hammurabi's Code and modern Canadian law.</p>
    <button onclick="startGame()">Begin Judging</button>
</div>

<div id="gameScreen" class="hidden">
    <h2 id="caseTitle"></h2>
    <canvas id="visual" width="600" height="300"></canvas>
    <p id="caseText"></p>
    <div id="choices"></div>
    <div id="feedback"></div>
    <button id="nextBtn" onclick="nextCase()" class="hidden">Next Case</button>
    <button id="restartBtn" onclick="restartGame()" class="hidden">Play Again</button>
</div>

</div>

<audio id="correctSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_8c97a4c6c4.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_2b32e3e0d6.mp3"></audio>

<script>

let currentCase = 0;

const cases = [
{
title: "Case 1: The Collapsing House",
text: "A builder constructs a house. The house collapses and kills the owner.",
correct: 2,
law: "Hammurabi Law 229: If a builder builds a house and it collapses and kills the owner, the builder shall be put to death.",
canada: "In Canada, this would result in criminal negligence charges and possibly prison time, not execution."
},
{
title: "Case 2: The False Accuser",
text: "A man accuses another of murder but cannot prove it.",
correct: 1,
law: "Hammurabi Law 3: If a man brings an accusation and cannot prove it, he shall be put to death.",
canada: "In Canada, false accusations may result in fines or jail for perjury, not death."
},
{
title: "Case 3: The Stolen Ox",
text: "A man steals an ox from another citizen.",
correct: 3,
law: "Hammurabi Law 8: If anyone steals livestock, he shall repay thirtyfold.",
canada: "In Canada, theft results in fines, restitution, or jail time."
},
{
title: "Case 4: Striking a Father",
text: "A son strikes his father during an argument.",
correct: 0,
law: "Hammurabi Law 195: If a son strikes his father, his hands shall be cut off.",
canada: "In Canada, assault laws apply equally and punishment involves fines or imprisonment."
},
{
title: "Case 5: Eye for an Eye",
text: "A man destroys another man's eye in a fight.",
correct: 4,
law: "Hammurabi Law 196: If a man destroys the eye of another man, they shall destroy his eye.",
canada: "In Canada, assault causing bodily harm leads to prison, not physical retaliation."
}
];

const options = [
["Fine him", "Exile him", "Execute the builder", "Make him rebuild", "No punishment"],
["Ignore the case", "Execute the accuser", "Fine both", "Public apology", "Whip him"],
["Cut off his hand", "Exile him", "No punishment", "Repay thirtyfold", "Public shame"],
["Cut off his hands", "Fine him", "Exile him", "Public apology", "No punishment"],
["Fine him", "Exile him", "Prison", "Public apology", "Destroy his eye"]
];

function startGame() {
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("gameScreen").classList.remove("hidden");
    loadCase();
}

function loadCase() {
    let c = cases[currentCase];
    document.getElementById("caseTitle").innerText = c.title;
    document.getElementById("caseText").innerText = c.text;
    document.getElementById("feedback").innerHTML = "";
    document.getElementById("nextBtn").classList.add("hidden");

    drawVisual(currentCase);

    let choicesDiv = document.getElementById("choices");
    choicesDiv.innerHTML = "";

    options[currentCase].forEach((opt, index) => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => chooseAnswer(index, btn);
        choicesDiv.appendChild(btn);
    });
}

function chooseAnswer(index, btn) {
    let buttons = document.querySelectorAll("#choices button");
    buttons.forEach(b => b.disabled = true);

    if(index === cases[currentCase].correct){
        document.getElementById("feedback").innerHTML =
        "<b>Correct according to Hammurabi.</b><br><br>" +
        cases[currentCase].law +
        "<br><br><b>Canadian Law:</b><br>" +
        cases[currentCase].canada;
        document.getElementById("correctSound").play();
    } else {
        document.getElementById("feedback").innerHTML =
        "<b>Incorrect.</b><br><br>" +
        cases[currentCase].law +
        "<br><br><b>Canadian Law:</b><br>" +
        cases[currentCase].canada;
        document.getElementById("wrongSound").play();
    }

    if(currentCase < cases.length - 1){
        document.getElementById("nextBtn").classList.remove("hidden");
    } else {
        document.getElementById("restartBtn").classList.remove("hidden");
    }
}

function nextCase(){
    currentCase++;
    loadCase();
}

function restartGame(){
    currentCase = 0;
    document.getElementById("restartBtn").classList.add("hidden");
    loadCase();
}

function drawVisual(caseNum){
    let canvas = document.getElementById("visual");
    let ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,600,300);

    // Background sand ground
    ctx.fillStyle = "#d2b48c";
    ctx.fillRect(0,0,600,300);

    ctx.fillStyle = "#8b5a2b";
    ctx.fillRect(0,220,600,80);

    ctx.fillStyle = "#000";
    ctx.lineWidth = 3;

    // CASE 1 — HOUSE COLLAPSE ANIMATION
    if(caseNum === 0){
        let collapse = false;

        function drawHouse(offset){
            ctx.fillStyle = "#654321";
            ctx.fillRect(200,120 + offset,200,100);
            ctx.fillRect(250,80 + offset,100,40);
        }

        drawHouse(0);

        setTimeout(() => {
            ctx.clearRect(0,0,600,300);
            ctx.fillStyle = "#d2b48c";
            ctx.fillRect(0,0,600,300);
            ctx.fillStyle = "#8b5a2b";
            ctx.fillRect(0,220,600,80);

            // rubble
            ctx.fillStyle = "#654321";
            for(let i=0;i<8;i++){
                ctx.fillRect(200 + i*25, 180 + Math.random()*20, 20, 20);
            }

            ctx.fillStyle = "red";
            ctx.font = "18px Papyrus";
            ctx.fillText("The house has collapsed!", 200, 60);
        }, 1000);
    }

    // CASE 2 — FALSE ACCUSER
    if(caseNum === 1){
        // Two people
        ctx.beginPath();
        ctx.arc(200,150,30,0,Math.PI*2);
        ctx.stroke();
        ctx.fillText("Accuser",165,200);

        ctx.beginPath();
        ctx.arc(400,150,30,0,Math.PI*2);
        ctx.stroke();
        ctx.fillText("Accused",370,200);

        // pointing line
        ctx.beginPath();
        ctx.moveTo(230,150);
        ctx.lineTo(370,150);
        ctx.stroke();

        ctx.font = "22px Papyrus";
        ctx.fillText("⚖",290,80);
    }

    // CASE 3 — STOLEN OX (CLEAR OX SHAPE)
    if(caseNum === 2){
        ctx.fillStyle = "#5c4033";
        ctx.fillRect(220,150,160,60); // body
        ctx.fillRect(360,160,40,40);  // head
        ctx.fillRect(250,210,20,40);  // legs
        ctx.fillRect(300,210,20,40);
        ctx.fillRect(340,210,20,40);

        // horns
        ctx.beginPath();
        ctx.moveTo(360,160);
        ctx.lineTo(350,140);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(400,160);
        ctx.lineTo(410,140);
        ctx.stroke();

        ctx.fillStyle = "#000";
        ctx.fillText("OX",285,145);

        ctx.fillStyle = "red";
        ctx.fillText("STOLEN",260,80);
    }

    // CASE 4 — STRIKING FATHER
    if(caseNum === 3){
        // father
        ctx.beginPath();
        ctx.arc(250,150,30,0,Math.PI*2);
        ctx.stroke();
        ctx.fillText("Father",220,200);

        // son
        ctx.beginPath();
        ctx.arc(350,150,30,0,Math.PI*2);
        ctx.stroke();
        ctx.fillText("Son",330,200);

        // action line (non-graphic)
        ctx.beginPath();
        ctx.moveTo(320,150);
        ctx.lineTo(280,150);
        ctx.stroke();

        ctx.fillStyle = "red";
        ctx.fillText("Strike",280,120);
    }

    // CASE 5 — EYE FOR AN EYE (SYMBOLIC)
    if(caseNum === 4){
        ctx.beginPath();
        ctx.arc(250,150,40,0,Math.PI*2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(350,150,40,0,Math.PI*2);
        ctx.stroke();

        ctx.fillStyle = "#000";
        ctx.fillText("Eye",230,210);
        ctx.fillText("Eye",330,210);

        ctx.font = "26px Papyrus";
        ctx.fillText("⚖ Equal Justice ⚖",200,80);
    }
}

</script>

</body>
</html>
