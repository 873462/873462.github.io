<!DOCTYPE html>
<html>
<head>
  <title>Code Tutor</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    textarea {
      width: 80%;
      height: 120px;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      width: 60%;
      border-radius: 10px;
    }

    #result { margin-top: 10px; }
    #hint { color: #38bdf8; }
    #score { margin-top: 10px; color: #facc15; }
  </style>
</head>
<body>

<h1>💻 Interactive Coding Tutor</h1>

<div>
  <button onclick="setDifficulty('easy')">Easy</button>
  <button onclick="setDifficulty('medium')">Medium</button>
  <button onclick="setDifficulty('hard')">Hard</button>
</div>

<div class="card">
  <p id="progress"></p>
  <p id="question">Select a difficulty to start</p>

  <textarea id="code" placeholder="Type your code..."></textarea><br>

  <button onclick="checkAnswer()">Check</button>
  <button onclick="nextQuestion()">Next</button>

  <p id="result"></p>
  <p id="hint"></p>
  <p id="score"></p>
</div>

<script>
let score = 0;
let current = -1;
let currentSet = [];

const sets = {
  easy: [
    {q:"Create a variable x = 5", a:"let x = 5", h:"Use let"},
    {q:"Create variable y = 10", a:"let y = 10", h:"Same pattern"}
  ],
  medium: [
    {q:"Write a function called greet", a:"function greet()", h:"Use function"},
    {q:"If x > 10", a:"if (x > 10)", h:"Use parentheses"}
  ],
  hard: [
    {q:"Write a for loop from 0 to 5", a:"for(let i=0;i<5;i++)", h:"Use i++"},
    {q:"Console log 'Hello'", a:"console.log('hello')", h:"Use console.log"}
  ]
};

function normalize(t){
  return t.toLowerCase().replace(/\s+/g,'');
}

function setDifficulty(level){
  currentSet = sets[level];
  score = 0;
  current = -1;
  nextQuestion();
}

function nextQuestion(){
  current++;
  if(current >= currentSet.length){
    document.getElementById("question").textContent = "🎉 Finished!";
    return;
  }

  document.getElementById("question").textContent = currentSet[current].q;
  document.getElementById("code").value = "";
  document.getElementById("result").textContent = "";
  document.getElementById("hint").textContent = "";

  document.getElementById("progress").textContent =
    `Question ${current+1} / ${currentSet.length}`;

  document.getElementById("score").textContent =
    `Score: ${score}`;
}

function checkAnswer(){
  const user = normalize(document.getElementById("code").value);
  const correct = normalize(currentSet[current].a);

  if(user.includes(correct)){
    document.getElementById("result").textContent = "✅ Correct!";
    score++;
  } else {
    document.getElementById("result").textContent = "❌ Try again!";
    document.getElementById("hint").textContent =
      "Hint: " + currentSet[current].h;
  }

  document.getElementById("score").textContent =
    `Score: ${score}`;
}
</script>

</body>
</html>
